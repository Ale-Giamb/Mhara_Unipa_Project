<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Video Live Pepper</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <img src="/stream" alt="Stream video">
</body>
</html>
